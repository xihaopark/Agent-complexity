version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: renzo-backend
    ports:
      - "${BIND_IP:-0.0.0.0}:${BACKEND_PORT:-18000}:18000"
    volumes:
      - ./data:/app/data
      - ./app:/app/renzo/app
      - ./workflow_pool:/app/workflow_pool
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ./.env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - DATA_ROOT=/app/data
      - WORKFLOW_POOL_DIR=/app/workflow_pool
      - WORKFLOW_RUNTIME_INSTALL=${WORKFLOW_RUNTIME_INSTALL:-1}
      - NEXTFLOW_VERSION=${NEXTFLOW_VERSION:-24.10.5}
      - SNAKEMAKE_VERSION=${SNAKEMAKE_VERSION:-8.30.0}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:18000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    networks:
      - renzo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: renzo-frontend
    ports:
      - "${BIND_IP:-0.0.0.0}:${FRONTEND_PORT:-13000}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - renzo-network

networks:
  renzo-network:
    driver: bridge

volumes:
  data:
