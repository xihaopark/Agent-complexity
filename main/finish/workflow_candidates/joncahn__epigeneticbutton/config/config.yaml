QC_option: "none" # options: ["none"|"all"] for fastqc
GO: false # If switching to true, make sure the database is created, or the required files below are edited

# Input options: By default, will perform the analysis from the raw fastqs. If intermediate files are already available, switch the corresponding format to "true".
trimmed_fastqs: false # if fastqs are already trimmed (fastq file(s) (can be gzipped) required in the `fastq_path` folder of the metadata samplefile, 1 matching the `seq_id` if SE, 2 ending in R1 and R2 if PE)
aligned_bams: false # if ChIP-seq alignments are already performed (a single sam or bam file matching the `seq_id` is required in the `fastq_path` folder of the metadata samplefile). Only works for ChIP-seq data (histone or TF) since other ouput from the alignment steps are necessary for the other data types (e.g. conut table for RNA-seq)

