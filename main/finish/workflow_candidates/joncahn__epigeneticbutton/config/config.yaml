# Trimming and processing parameters:
trimming_quality:
  ChIP: "-q 10 -m 20"
  RNA: "-q 10 -m 20"
  TF: "-q 10 -m 20"
  mC: "-q 10 -m 20"
  sRNA: "-q 10 -m 15"
  ATAC: "-q 10 -m 20"

adapter1:
  ChIP: "AGATCGGAAGAGCACACGTCTGAAC" # default illumina
  RNA: "AGATCGGAAGAGCACACGTCTGAAC" # default illumina
  TF: "AGATCGGAAGAGCACACGTCTGAAC" # default illumina
  mC: "AGATCGGAAGAGCACACGTCTGAAC" # default illumina
  sRNA: "TGGAATTCTCGGGTGCCAAGG" # default nextflex
  ATAC: "TCGTCGGCAGCGTCAGATGTGTATAAGAGACAG" # default nextera

adapter2:
  ChIP: "AGATCGGAAGAGCGTCGTGTAGGGA" # default illumina
  RNA: "AGATCGGAAGAGCGTCGTGTAGGGA" # default illumina
  TF: "AGATCGGAAGAGCGTCGTGTAGGGA" # default illumina
  mC: "AGATCGGAAGAGCGTCGTGTAGGGA" # default illumina
  sRNA: "AGATCGGAAGAGCGTCGTGTAGGGAAAGA" # default nextflex
  ATAC: "GTCTCGTGGGCTCGGAGATGTGTATAAGAGACAG" # default nextera

# Mapping option default
chip_mapping_option: "default" # options: [ 'default' | 'repeat' | 'repeatall' | 'all' ]
atac_mapping_option: "default" # options: [ 'default' | 'repeat' | 'repeatall' | 'all' ]

# Bowtie2-based mapping parameters (shared by ChIP, TF, and ATAC)
# For mapping
bt2_mapping_strategy:
  default:
    map_pe: "--end-to-end --maxins 1500"
    map_se: "--end-to-end"
    filter: "-b -h -q 10 -F 256"
  repeat:
    map_pe: "--very-sensitive --no-mixed --no-discordant --k 100 --end-to-end"
    map_se: "--very-sensitive --k 100 --end-to-end"
    filter: "-b -h -q 10 -F 256"
  repeatall:
    map_pe: "--very-sensitive --no-mixed --no-discordant --k 100 --end-to-end"
    map_se: "--very-sensitive --k 100 --end-to-end"
    filter: "-b -h -F 256"
  all:
    map_pe: "--end-to-end --maxins 1500"
    map_se: "--end-to-end "
    filter: "-b -h -F 256"

# For bigwigs
chip_tracks:
  binsize: 1
  params: "--scaleFactorsMethod None --normalizeUsing CPM --extendReads 300"

atac_tracks:
  binsize: 1
  params: "--normalizeUsing CPM"

# For peaks
chip_callpeaks:
  # To link the type of IP with the type of peaks. Can be updated with other marks. If creating regex patterns, make sure to escape "." with "\."
  peaktype:
    'H3K4me1|H3K27me1|H3K27me2|H3K27me3|H3K9me1|H3K9me2|H3K9me3|H4K20me1|H4K20me2|H4K20me3|.*DDM1|H3\.3|H3\.1|MGH3|CenH3|PolIIS2P|H2AT120Ph|H2AKub|H3K36me3': "broad"
    'H3K27ac|H3K4me3|H3K9ac|H4K16ac|H3K23ac|MNase': "narrow" 
    'H3|H4': "broad"
  params: "--keep-dup 'all' --nomodel"

atac_callpeaks:
  peaktype: "narrow"
  params: "--keep-dup 'all' --nomodel --shift 75 --extsize 150"
  
rampage_calltss:
  peaktype: "narrow"
  params: "--keep-dup 'all' --nomodel --extsize 100"

diffpeaks_params:
  chip_pe: "-w 2000 --pe"
  chip_se: "-w 2000"
  TF_pe: "-w 1000 --pe"
  TF_se: "-w 1000"
  ATAC_pe: "-w 1000 --s1 75 --s2 75"
  ATAC_se: "-w 1000 --s1 75 --s2 75"

upset_allreps: false # whether to use data from all individual replicates or from merged samples when multiple replicates are present. Default to false (using merged replicates). Only affects Upset for peaks and TSS, not sRNA clusters (always allreps).

# RNA parameters
rna_tracks:
  RNAseq:
    file_order: "rnaseq"
    param_bg: "--outWigType bedGraph"
    strandedness: "reverse" # default for stranded RNAseq libraries. Use "unstranded" if libraries do not keep strand information
    multimap: "multiple" # change to 'unique' if you only want uniquely mapped reads
  RAMPAGE:
    file_order: "rampage"
    param_bg: "--outWigType bedGraph read1_5p"
    strandedness: "forward" # default for stranded RAMPAGE libraries. Use "unstranded" if libraries do not keep strand information
    multimap: "multiple" # change to 'unique' if you only want uniquely mapped reads

# WGBS parameters
mC_context: "all" # another option should be set for CG-only (changes parameters for methylation extraction step)
pca_bs: 1000 # binsize for PCA 
pca_step: 10000 # step between bins for PCA 
# If using the Pico or EMseq kit for DNA methylation, trimming parameters should be changed "-u 10 -q 10 -m 20" for SE and "-u 10 -U 10 -q 10 -m 20" ## Can be added as an option based on "sample" name and PE
mC_mapping:
  default: 
    map_pe: "--maxins 1000"
    map_se: ""
    process_pe: "--ignore_r2 2 --buffer_size 16G" # change buffer size if not appropriate for setup
    process_se: "--buffer_size 16G" # change buffer size if not appropriate for setup
  WGBS: 
    map_pe: "--maxins 1000"
    map_se: ""
    process_pe: "--ignore_r2 2 --buffer_size 16G" # change buffer size if not appropriate for setup
    process_se: "--buffer_size 16G" # change buffer size if not appropriate for setup
  EMseq:
    map_pe: "--maxins 1000"
    map_se: ""
    process_pe: "--buffer_size 16G" # change buffer size if not appropriate for setup
    process_se: "--buffer_size 16G" # change buffer size if not appropriate for setup
  Pico:
    map_pe: "--maxins 1000 --non_directional"
    map_se: "--non_directional"
    process_pe: "--buffer_size 16G" # change buffer size if not appropriate for setup
    process_se: "--buffer_size 16G" # change buffer size if not appropriate for setup

# Whether to use the custom version of the script to call DMRs
custom_script_dmrs: false # true will use workflow/scripts/call_DMRs_custom.R which explore different options to call DMRs (more time and resource intensive)

# Direct methylation (dmC) parameters
# For sample_type "dmC" - native base modification detection from long-read sequencing (Oxford Nanopore, PacBio)
# Supports two input formats that are automatically detected:
#   - modBAM: BAM files with MM/ML tags from modified basecalling (e.g., Dorado, Guppy)
#   - bedMethyl: Pre-computed methylation calls in bedMethyl format (e.g., from prior modkit pileup)
dmc_methylation:
  alignment:
    # Minimap2 preset for alignment (used by mm2plus, an accelerated minimap2 fork)
    # "lr:hqae" = long-read, high-quality, accurate end-to-end alignment
    # Optimized for high-accuracy ONT basecalls (e.g., Guppy SUP, Dorado HAC/SUP models)
    # Alternative presets: "map-ont" (standard ONT), "map-hifi" (PacBio HiFi)
    preset: "lr:hqae"
  pileup:
    # Combine 5mC (5-methylcytosine) and 5hmC (5-hydroxymethylcytosine) into total methylation
    # This matches bisulfite sequencing behavior, which cannot distinguish these modifications
    # Set to false to analyze them separately (requires changes to downstream bigwig generation)
    combine_mods: true
    # Minimum read coverage threshold for reporting a methylation call
    # Sites with fewer reads are excluded from bedMethyl output
    min_coverage: 3

# DMR (Differentially Methylated Region) calling method for dmC samples
# Options:
#   - "dmrcaller": R/Bioconductor DMRcaller package (default)
#     Same method used for Bismark samples, enables unified dmC vs Bismark comparisons
#     Uses sliding window approach with statistical testing
#   - "modkit": Native modkit DMR caller with HMM-based segmentation (experimental)
#     Only suitable for dmC vs dmC comparisons, not compatible with Bismark samples
#     May provide better sensitivity for long-read specific patterns
# Note: Bismark samples always use dmrcaller regardless of this setting
dmc_dmr_method: "dmrcaller"

# small RNA parameters
nextflex_v3_deduplication: false # additional deduplication if nextflex v3 kit was used for sRNA library preparation
structural_rna_depletion: true # to filter structural RNA (rRNAs, tRNAs, snoRNAs) before mapping. Recommended step when studying microRNAs and small interfering RNAs.
srna_mapping_params: "--mmap u --dicermin 21 --dicermax 24 --dn_mirna" # consider adding --known_miRNAs KNOWN_MIRNAS.fa (fetching miRNAs sequences from miRBase)
srna_min_size: 21 # these sizes in nucleotide will be used for filtering bigiwg and creating an individual file for each nucleotide size in between (e.g. 20 21 22 23 24). Also used in the Upset plots (if within the dicer calls above)
srna_max_size: 24 # these sizes in nucleotide will be used for filtering bigiwg and creating an individual file for each nucleotide size in between (e.g. 20 21 22 23 24). Also used in the Upset plots (if within the dicer calls above)
srna_heatmap_sizes: [21, 22, 24] # these sizes in nucleotide will be used for plotting heatmaps and browsers. Can add as many as desired as a list, for sizes within the range above.

# For all plots (heatmaps, metaplots, browsers)
plot_allreps: false # whether to use data from all individual replicates or from merged samples when multiple replicates are present. Default to false (using merged replicates).
# For deeptools heatmaps and profiles
heatmaps_scales: "type" # options: [ 'default' = default scaling from deeptools, one scale for all samples | 'sample' = each sample on its own scale | 'type' = each type of data on a different scale (each ChIP mark + each TF + RNA + sRNA + each mC context) ]
stranded_heatmaps: true # chose whether the heatmap should be done with stranded information or not. If true, lines in the bedfile without strand information (6th column "+" or "-") will not be included.
heatmaps_sort_options: "mean" # options: [ 'no' | 'mean' | median' ]; mean = "--sortRegions descend --sortUsing mean"
heatmap_sort_mc_after_others: true # chose whether the heatmaps for mC samples are done based on the sort order of the other samples or not.
profiles_scale: "mean" # options: [ 'mean' | median' ]
profiles_plot_params: "--plotType lines"
heatmaps_plot_params:
  all: "--colorMap seismic --interpolationMethod bilinear"
  most: "--colorMap seismic --interpolationMethod bilinear"
  ChIP: "--colorMap seismic --interpolationMethod bilinear"
  TF: "--colorMap seismic --interpolationMethod bilinear"
  RNA: "--colorMap seismic --interpolationMethod bilinear"
  sRNA: "--colorMap seismic --interpolationMethod bilinear"
  mC: "--colorMap Oranges --missingDataColor 0.9 --interpolationMethod nearest"
  ATAC: "--colorMap seismic --interpolationMethod bilinear"
heatmaps:
  regions:
    base: "scale-regions --missingDataAsZero --skipZeros"
    bs: 50
    base_mc: "scale-regions"
    bs_mc: 100
    before: 2000
    middle: "-m 5000"
    after: 2000
  tss:
    base: "reference-point --referencePoint TSS --missingDataAsZero --skipZeros"
    bs: 50
    base_mc: "reference-point --referencePoint TSS"
    bs_mc: 100
    before: 2000
    middle: ""
    after: 6000
  tes:
    base: "reference-point --referencePoint TES --missingDataAsZero --skipZeros"
    bs: 50
    base_mc: "reference-point --referencePoint TES"
    bs_mc: 100
    before: 6000
    middle: ""
    after: 2000
heat_mcg: 100
heat_mchg: 60
heat_mchh: 40

# For TF motifs analysis using meme
motifs: true # change to false for motifs on final selected peaks
motifs_allreps: false # change to true for motifs analysis on all replicates for TF ChIP-seq
jaspar_db: "data/JASPAR2024_CORE_plants_non-redundant_pfms_meme.txt" # other databases can be downloaded at https://jaspar.elixir.no/downloads/

## optional targets for extra output
# motifs analysis
motif_target_file_label: "target_motifs" # This name will be used for the name of the results files and should used in the rule target
motif_target_file: "data/target_genes.bed" # bed file containing the regions to use for motifs analysis
motif_ref_genome: "ColCEN" # Reference genome corresponding to the motif target file

# gene expression plots
rnaseq_target_file_label: "target_genes" # This name will be used for the name of the results files and should used in the rule target.
rnaseq_target_file: "data/target_genes.txt" # tab-delimited file listing genes in rows where the first column is GID (matching the gene IDs in the reference genome gff) and optionally the second column are labels (see example). Other columns will be ignored.
rnaseq_background_file: "default" # tab-delimited file with a column of GID (matching the gene IDs in the reference genome gff). Other columns will be ignored. Will be used as background for GO enrichment analysis. Default is all genes.

# sRNA diffenrential expression analysis
srna_target_file_label: "miRNAs" # This name will be used for the results folder and should be used in the rule target.
srna_target_file: "config/ath.gff3" # file of target regions for sRNA analysis. It will be used as LOCIFILE in ShortStack (from ShortStack: Can be simple tab-delimited, .bed, or .gff3. Tab-delimited format is column 1 with coordinates Chr:start-stop, column 2 with names. Input file assumed to be simple tab-delimited unless file name ends in .bed or .gff3.)

# heatmaps and profiles
heatmap_target_file_label: "target_genes" # This name will be used for the name of the results files and should used in the rule target.
heatmap_target_file: "data/target_genes.bed" # bed file containing the regions to use for heatmaps. Can have a header.

# browsers
browser_target_file_label: "target_loci" # This name will be used for the name of the results files and should used in the rule target.
browser_target_file: "data/target_loci.bed" # bed file containing the regions to use for browser shots. Each region will be a seperate page in a pdf. Can have a header.
browser_TE_file: true # Whether to use a file of TEs or not. The file should be listed in the corresponding reference genome, and be a (potentially gzipped) bed file.
browser_scales: "sample" # options: [ 'sample' = each sample on its own scale | 'type' = each type of data on a different scale (each ChIP mark + each TF + RNA + sRNA + each mC context) ]
chromosome_bs: 50000 # default to 50kb bins for full chromosome browsers 
fixed_mc_scales: true # Whether the scales for mC should be fixed to the value below
fixed_mcg: 100
fixed_mchg: 80
fixed_mchh: 60

