[pytest]
# Pytest configuration for EpigeneticButton

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Minimum Python version
minversion = 3.8

# Command-line options to always use
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals

# Custom markers for categorizing tests
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for workflows
    slow: Tests that take a long time to run
    requires_samtools: Tests that require samtools to be installed
    requires_data: Tests that require external data files

# Coverage options
[coverage:run]
source = workflow/scripts
omit =
    */tests/*
    */test_*.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
