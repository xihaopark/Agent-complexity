samples: "config_sra/samples.tsv"
units: "config_sra/units.tsv"

remove_duplicates:
  activate: false

calc_consensus_reads:
  activate: false

ref:
  # Number of chromosomes to consider for calling.
  # The first n entries of the FASTA will be considered.
  n_chromosomes: 17
  # Ensembl species name
  species: saccharomyces_cerevisiae
  # Ensembl release
  release: 110
  # Genome build
  build: R64-1-1
  pangenome:
    activate: false
    source: "hprc"
    version: "v1.1"

primers:
  trimming:
    primers_fa1: ""
    primers_fa2: ""
    tsv: ""
    library_length: 0

params:
  fastp: ""
  picard:
    MarkDuplicates: ""
  gatk:
    BaseRecalibrator: ""
    applyBQSR: ""
