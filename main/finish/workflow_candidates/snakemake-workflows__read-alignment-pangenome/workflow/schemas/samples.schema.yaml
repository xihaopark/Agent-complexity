$schema: "https://json-schema.org/draft/2020-12/schema"

description: an entry in the sample sheet

type: object
properties:
  sample_name:
    type: string
    description: sample name/identifier (alphanumeric string, that may additionally contain '_' and '-')
    pattern: "^[a-zA-Z_0-9-]+$"
  panel:
    type: string
    description: ID of primer panel
  platform:
    type: string
    enum:
      - "CAPILLARY"
      - "LS454"
      - "ILLUMINA"
      - "SOLID"
      - "HELICOS"
      - "IONTORRENT"
      - "ONT"
      - "PACBIO"
    description: used sequencing platform
  umi_read:
    type: string
    pattern: "^(fq[1,2]|both)$"
    description: fq1 or fq2 for read containing umis
  umi_len:
    type: integer
    description: length of UMI

required:
  - sample_name
  - platform

dependencies:
  umi_read:
    - umi_len
