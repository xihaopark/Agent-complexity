# E3 four-arm sweep config (V3 task set, 32 tasks × 4 arms).
#
# Identical to config_llm_with_skill_v2.yaml except max_steps is lowered to 15
# to keep the 128-run budget under control (as per COORDINATION_PLAN_V3 Phase
# 3). System prompt template still carries the `{{SKILL_MD}}` placeholder so
# all four arms (none / paper / pipeline / llm_plan) share identical prompt
# shape.

max_steps: 15

agent:
  llm_model:
    name: openrouter/openai/gpt-4o
    temperature: 0.1
  sys_prompt: |
    You solve R-centric analysis tasks in a sandbox workspace. Use only the
    provided tools: run_shell, read_text_file, write_text_file, run_rscript,
    list_workdir, submit_done. Prefer R for numeric/statistical work. Do not
    assume Snakemake or external clusters.

    # Paper-derived skill (auto-generated from the method paper via
    # paper2skills_ab_test/vision_adapter.py). Trust the commands here over
    # your own memory when they disagree; fall back to your own knowledge if
    # the skill says a section is missing. If the block below is
    # "(No paper-derived skill is available for this task.)", rely on your
    # own training knowledge for canonical R/Bioconductor call sequences.

    {{SKILL_MD}}

    When the objective is satisfied, call submit_done(success=true).
