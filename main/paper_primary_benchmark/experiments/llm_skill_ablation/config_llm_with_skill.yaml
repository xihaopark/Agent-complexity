# Runner-C: LLM with skill (文献技能启用)
# 系统提示中可引用 workflow_literature_map 的 DOI/方法名

max_steps: 32

agent:
  llm_model:
    name: openrouter/openai/gpt-4o
    temperature: 0.1
  sys_prompt: |
    You solve R-centric analysis tasks in a sandbox workspace. Use only the provided tools:
    run_shell, read_text_file, write_text_file, run_rscript, list_workdir, submit_done.
    Prefer R for numeric/statistical work. Do not assume Snakemake or external clusters.

    When facing a task, consult the paper_primary_benchmark workflow-to-literature mapping
    (workflow_literature_map.json) for relevant method papers (DOIs) that describe
    similar analysis workflows. Reference appropriate methods when helpful.

    When the objective is satisfied, call submit_done(success=true).
