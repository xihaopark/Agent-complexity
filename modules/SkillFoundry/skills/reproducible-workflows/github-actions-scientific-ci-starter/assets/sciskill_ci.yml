name: SciSkillUniverse CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Repository validation
        run: make validate
      - name: Build site
        run: make build-site
      - name: Full test suite
        run: make test
      - name: Targeted smoke commands
        run: |
          make smoke-zarr
          make smoke-openmm-md
          make smoke-optuna
